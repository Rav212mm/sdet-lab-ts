name: CI (TypeScript)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: core
            name: "Unit Tests (core)"
            command: "npm run test -w core"
          - module: api-tests
            name: "API Tests"
            command: "npm run test -w api-tests"
          - module: db-tests
            name: "DB Integration Tests"
            command: "npm run test -w db-tests"
          - module: ui-tests
            name: "UI Tests (Playwright)"
            command: "npm run test -w ui-tests"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: matrix.module == 'api-tests' || matrix.module == 'ui-tests'
        run: npx playwright install --with-deps chromium
        working-directory: ${{ matrix.module }}

      - name: Run ${{ matrix.name }}
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ${{ matrix.command }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.module }}
          path: ${{ matrix.module }}/allure-results/
          if-no-files-found: ignore

  summary:
    name: "CI Summary"
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "Matrix result: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All test jobs passed."